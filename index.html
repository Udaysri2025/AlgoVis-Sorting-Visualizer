<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AlgoVis | DSA Observatory</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="background-glow"></div>

    <div class="app-container">
        
        <nav class="navbar">
            <div class="logo">
                <i class="fas fa-chart-bar"></i>
                <span>AlgoVis</span>
            </div>
            <div class="stats-panel">
                <div class="stat-card">
                    <i class="fas fa-balance-scale"></i>
                    <span id="comparisons-display">0</span>
                    <label>Comparisons</label>
                </div>
                <div class="stat-card">
                    <i class="fas fa-arrow-right-arrow-left"></i>
                    <span id="swaps-display">0</span>
                    <label>Swaps</label>
                </div>
                <div class="stat-card">
                    <i class="fas fa-memory"></i>
                    <span id="accesses-display">0</span>
                    <label>Array Accesses</label>
                </div>
            </div>
        </nav>

        <div class="visualizer-wrapper">
            <div id="array-container" class="array-bars"></div>
        </div>

        <div class="info-panel">
            <div class="algo-meta">
                <h3 id="algo-name">Bubble Sort</h3>
                <div class="complexity-badges">
                    <span class="badge time"><i class="far fa-clock"></i> <span id="time-complexity">O(n²)</span></span>
                    <span class="badge space"><i class="fas fa-database"></i> <span id="space-complexity">O(1)</span></span>
                </div>
                <p id="algo-description">Repeatedly steps through the list, compares adjacent elements and swaps them if they are in the wrong order.</p>
            </div>
            <div class="step-counter">
                <i class="fas fa-shoe-prints"></i>
                <span>Step: <span id="step-display">0</span> / <span id="total-steps">0</span></span>
            </div>
        </div>

        <div class="control-panel glass-card">
            <div class="control-row">
                <div class="control-group">
                    <label><i class="fas fa-microchip"></i> Algorithm</label>
                    <select id="algorithm-select" class="modern-select">
                        <option value="bubble">Bubble Sort</option>
                        <option value="insertion">Insertion Sort</option>
                        <option value="quick">Quick Sort</option>
                    </select>
                </div>
                <div class="control-group">
                    <label><i class="fas fa-tachometer-alt"></i> Speed</label>
                    <input type="range" id="speed" min="1" max="100" value="40" class="slider">
                </div>
                <div class="control-group">
                    <label><i class="fas fa-cubes"></i> Size</label>
                    <input type="range" id="size" min="10" max="120" value="50" class="slider">
                </div>
            </div>

            <div class="control-row button-row">
                <button class="btn-primary" onclick="generateArray()">
                    <i class="fas fa-dice"></i> Randomize
                </button>
                <button class="btn-success" id="playBtn" onclick="startSorting()">
                    <i class="fas fa-play"></i> Play
                </button>
                <button class="btn-warning" id="pauseBtn" onclick="pauseAnimation()" disabled>
                    <i class="fas fa-pause"></i> Pause
                </button>
                <button class="btn-secondary" onclick="stepForward()" id="stepBtn" disabled>
                    <i class="fas fa-step-forward"></i> Step
                </button>
                <button class="btn-danger" onclick="resetState()" id="resetBtn">
                    <i class="fas fa-undo-alt"></i> Reset
                </button>
            </div>
            
            <div class="progress-container">
                <div class="progress-bar" id="progress-bar"></div>
            </div>
        </div>
    </div>

    <script src="/script.js"></script>
</body>
</html>
